name: CI/CD - Spring Angular MySQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ========== Étape 1: Récupération du code ==========
      - name: Checkout source code
        uses: actions/checkout@v4

      # ========== Build Backend (with Maven) ==========
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          chmod +x mvnw
          ./mvnw clean package -DskipTests -B

      # ========== Étape 2: Build & Push Docker Images ==========
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          cd springboot/app
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Build and push frontend image
        run: |
          cd angular-app
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      # ========== Étape 3: Test with Docker Compose ==========
      - name: Update docker-compose.yml for Docker Hub images
        run: |
          sed -i "s|image: angular-app|image: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|image: spring-app|image: ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest|g" docker-compose.yml

      - name: Start application with Docker Compose
        run: docker compose up -d

      - name: Wait for services to initialize
        run: sleep 90

      - name: Verify containers are running
        run: |
          docker compose ps
          # Check that no container has exited
          if docker compose ps | grep -q "Exit"; then
            echo "❌ One or more containers failed to start"
            docker compose logs
            exit 1
          fi
          echo "✅ All containers are running"

      - name: Verify frontend can reach backend (basic connectivity)
        run: |
          # Test if ports are listening (simpler than HTTP health check)
          if ! timeout 10 bash -c '</dev/tcp/localhost/8081' 2>/dev/null; then
            echo "⚠️ Backend port 8081 not responding, showing logs..."
            docker compose logs spring-boot-app
          else
            echo "✅ Backend port 8081 is listening"
          fi
          
          if ! timeout 10 bash -c '</dev/tcp/localhost/4200' 2>/dev/null; then
            echo "⚠️ Frontend port 4200 not responding, showing logs..."
            docker compose logs angular-app
          else
            echo "✅ Frontend port 4200 is listening"
          fi

      - name: Show logs for debugging (on failure)
        if: failure()
        run: docker compose logs