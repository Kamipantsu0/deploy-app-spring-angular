name: CI/CD - Spring Angular MySQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with Maven
        run: |
          cd springboot/app
          chmod +x mvnw
          ./mvnw clean package -DskipTests -B
          ls -la target/*.jar || echo "ERROR: No JAR found!"
          JAR_NAME=$(ls target/*.jar | head -1)
          echo "Found JAR: $JAR_NAME"
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          cd springboot/app
          JAR_FILE=${JAR_NAME:-target/demo-0.0.1.jar}
          echo "Building with JAR: $JAR_FILE"
          docker build --build-arg JAR_FILE="$JAR_FILE" -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      - name: Build and push frontend image
        run: |
          cd angular-app
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      - name: Update docker-compose.yml for Docker Hub
        run: |
          sed -i "s|image: angular-app|image: ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest|g" docker-compose.yml
          sed -i "s|image: spring-app|image: ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest|g" docker-compose.yml

      - name: Start application with Docker Compose
        run: docker compose up -d

      - name: Show running containers
        run: docker compose ps

      - name: Wait and retry backend health check
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:8081/actuator/health; then
              echo "✅ Backend is ready!"
              break
            fi
            echo "⏳ Attempt $i/30 - Backend not ready yet, waiting 10s..."
            sleep 10
          done
          # Final check - fail if still not ready
          curl -f http://localhost:8081/actuator/health || (docker compose logs && exit 1)

      - name: Wait and retry frontend check
        run: |
          echo "Waiting for frontend to be ready..."
          for i in {1..15}; do
            if curl -sf http://localhost:4200; then
              echo "✅ Frontend is ready!"
              break
            fi
            echo "⏳ Attempt $i/15 - Frontend not ready yet, waiting 10s..."
            sleep 10
          done
          curl -f http://localhost:4200 || (docker compose logs && exit 1)

      - name: Show logs for debugging (always run on failure)
        if: failure()
        run: docker compose logs